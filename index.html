<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aantik — Monitor Sectorial</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#2d5b86;--teal:#51c0ac;--cel:#9dcfe4;--bg:#f4f7fa}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);min-height:100vh;padding:20px}
.shell{max-width:900px;margin:0 auto;background:var(--bg);border-radius:14px;overflow:hidden;border:0.5px solid #dde3ea;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.topbar{background:var(--navy);padding:12px 22px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:11px}
.logo img{width:42px;height:42px;object-fit:contain}
.logotext{color:#fff;font-size:18px;font-weight:500}
.logosub{color:var(--cel);font-size:10px;letter-spacing:.08em;text-transform:uppercase;margin-top:1px}
.mo{background:rgba(81,192,172,.18);border:0.5px solid rgba(81,192,172,.35);color:var(--cel);font-size:12px;border-radius:6px;padding:4px 12px}
.sel-bar{background:#fff;border-bottom:0.5px solid #dde3ea;padding:12px 22px;display:flex;align-items:center;gap:12px}
.sel-lbl{font-size:12px;color:#6b7a8d;font-weight:500;white-space:nowrap}
select{padding:7px 12px;border-radius:8px;border:1.5px solid #dde3ea;font-size:14px;color:#1a2a3a;background:#fff;cursor:pointer;outline:none;flex:1;max-width:320px}
select:focus{border-color:var(--teal)}
.genbtn{padding:8px 18px;border-radius:8px;border:none;background:var(--teal);color:#fff;font-size:13px;font-weight:500;cursor:pointer}
.genbtn:hover{background:#3da896}
.genbtn:disabled{background:#b0d8d1;cursor:not-allowed}
.content{padding:18px 22px;display:flex;flex-direction:column;gap:14px}
.empty-msg{text-align:center;padding:40px;color:#a0aab4;font-size:14px}
.client-card{background:#fff;border-radius:10px;border:0.5px solid #dde3ea;padding:14px 18px}
.cname{font-size:19px;font-weight:500;color:var(--navy)}
.cgiro{font-size:13px;color:#6b7a8d;margin-top:3px}
.tags{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.tag{font-size:11px;padding:3px 9px;border-radius:5px;font-weight:500}
.tag-s{background:#e3edf6;color:var(--navy)}
.tag-c{background:#e3f5f1;color:#0d6e5f}
.cols{display:grid;grid-template-columns:1.2fr .8fr;gap:14px}
@media(max-width:600px){.cols{grid-template-columns:1fr}}
.panel{background:#fff;border-radius:10px;border:0.5px solid #dde3ea;overflow:hidden}
.phead{padding:9px 16px;border-bottom:0.5px solid #dde3ea;font-size:11px;font-weight:500;color:#8a97a5;text-transform:uppercase;letter-spacing:.06em}
.pb{padding:14px 16px}
.sem-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.sem{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:6px;font-size:13px;font-weight:500}
.sdots{display:flex;gap:3px;align-items:center}
.sd{width:14px;height:5px;border-radius:3px}
.tit{font-size:14px;font-weight:500;color:#1a2a3a;margin-bottom:10px;line-height:1.4}
.inds{background:var(--bg);border-radius:8px;padding:8px 12px;margin-bottom:10px}
.irow{display:flex;align-items:center;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:0.5px solid #eef0f2}
.irow:last-child{border-bottom:none}
.ilbl{color:#6b7a8d}
.ival{display:flex;align-items:center;gap:4px;font-weight:500;color:#1a2a3a}
.narr{font-size:13px;color:#4a5568;line-height:1.65;margin-bottom:10px}
.impl{border-left:3px solid var(--teal);padding-left:10px;border-radius:0}
.impl-lbl{font-size:10px;font-weight:500;color:var(--teal);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.impl-txt{font-size:12px;color:#4a5568;line-height:1.6}
.giro-sep{margin-top:12px;padding-top:12px;border-top:0.5px solid #eef0f2}
.giro-tag{display:inline-flex;align-items:center;gap:5px;background:#e3f5f1;color:#0d6e5f;font-size:11px;font-weight:500;padding:3px 9px;border-radius:5px;margin-bottom:8px}
.hrow{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.hm{font-size:11px;color:#8a97a5;width:36px}
.hbw{flex:1;background:#eef0f2;border-radius:3px;height:11px;overflow:hidden}
.hb{height:100%;border-radius:3px}
.hs{font-size:11px;color:#4a5568;width:28px;text-align:right}
.hnote{font-size:11px;color:#a0aab4;margin-top:10px;padding-top:8px;border-top:0.5px solid #eef0f2;line-height:1.5}
.load{display:flex;align-items:center;gap:8px;font-size:13px;color:#8a97a5;padding:20px 0}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .8s linear infinite}
.err{font-size:12px;color:#c0392b;background:#fdf0ee;border-radius:7px;padding:10px 12px}
.regen{font-size:11px;color:#8a97a5;cursor:pointer;border:0.5px solid #dde3ea;border-radius:5px;padding:3px 9px;background:transparent;margin-top:10px;float:right}
</style>
</head>

    aHTML=`<div class="sem-row"><span class="sem" style="background:${sem.bg};color:${sem.c}"><span style="width:8px;height:8px;border-radius:50%;background:${sem.dot};display:inline-block"></span>${sem.lbl}</span><div class="sdots">${pips}<span style="font-size:11px;color:#8a97a5;margin-left:4px">${res.score}/5</span></div></div><p class="tit">${res.titular||''}</p><div class="inds">${inds}</div><p class="narr">${res.narrativa||''}</p><div class="impl"><p class="impl-lbl">Implicación para ${cl.name}</p><p class="impl-txt">${res.implicacion||''}</p></div>${ginds?`<div class="giro-sep"><div class="giro-tag"><span style="width:6px;height:6px;border-radius:50%;background:#51c0ac;display:inline-block"></span>${cl.gl}</div><div class="inds">${ginds}</div><div class="impl" style="border-left-color:${cl.ac}"><p class="impl-lbl">Contexto del giro</p><p class="impl-txt">${res.giro_narrativa||''}</p></div></div>`:''}<button class="regen" onclick="runAnalysis()">Regenerar ↻</button><div style="clear:both"></div>`;
  }
  document.getElementById('content').innerHTML=`<div class="client-card"><p class="cname">${cl.name}</p><p class="cgiro">${cl.giro}</p><div class="tags"><span class="tag tag-s">${cl.sector}</span><span class="tag tag-c">SCIAN ${cl.scian}</span></div></div><div class="cols"><div class="panel"><div class="phead">Análisis sectorial — Abril 2026</div><div class="pb">${aHTML}</div></div><div class="panel"><div class="phead">Histórico de score</div><div class="pb">${histHTML}<p class="hnote">Datos de ejemplo nov–mar. Abril se agrega al completar el análisis.</p></div></div></div>`;
}
async function runAnalysis(){
  if(!current)return;
  const cl=CLIENTS[current],btn=document.getElementById('genbtn');
  btn.disabled=true;btn.textContent='Analizando...';
  results[current]='loading';render(current);
  const prompt=`Eres analista económico especializado en México. Analiza sentimiento del sector y giro de ${cl.name} para abril 2026.\n\nContexto: ${cl.ctx}\n\nResponde SOLO JSON sin texto ni backticks:\n{"semaforo":"verde|amarillo|rojo","score":1-5,"titular":"frase max 10 palabras","indicadores":[{"nombre":"...","valor":"...","icono":"positivo|neutro|negativo"},{"nombre":"...","valor":"...","icono":"positivo|neutro|negativo"},{"nombre":"...","valor":"...","icono":"positivo|neutro|negativo"}],"narrativa":"2-3 oraciones con datos concretos abril 2026","implicacion":"1-2 oraciones para ${cl.name}","giro_indicadores":[{"nombre":"...","valor":"...","icono":"positivo|neutro|negativo"},{"nombre":"...","valor":"...","icono":"positivo|neutro|negativo"}],"giro_narrativa":"1-2 oraciones sobre el giro de ${cl.name}"}`;
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1200,tools:[{type:"web_search_20250305",name:"web_search"}],messages:[{role:"user",content:prompt}]})});
    const d=await r.json();
    const txt=d.content.filter(b=>b.type==="text").map(b=>b.text).join("");
    const clean=txt.replace(/```json|```/g,"").trim();
    const s=clean.indexOf("{"),e=clean.lastIndexOf("}");
    results[current]=JSON.parse(clean.slice(s,e+1));
  }catch(err){results[current]={error:"No se pudo generar el análisis. Intenta de nuevo."};}
  btn.disabled=false;btn.textContent="Generar análisis";
  render(current);
}
</script>
